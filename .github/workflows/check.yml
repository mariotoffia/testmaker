name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Install pinned lint tools
        run: |
          make install
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build + lint + test
        run: make check
