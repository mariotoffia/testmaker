version: 3
workdir: .

# ---------------------------------------------------------------------------
# Architecture linter — the SINGLE SOURCE OF TRUTH for layering.
# ARCHITECTURE.md narrates these rules; this file enforces them.
#
# Dependency rule (Clean Architecture): dependencies point INWARD only.
#
#   domain  <-  ports  <-  app  <-  adapters  <-  cmd
#
#   * domain   : pure, stdlib-only, no project deps
#   * ports    : may import domain only (the hexagon boundary = interfaces)
#   * app      : use-cases; may import domain + ports
#   * adapters : implement ports; may import domain + ports (+ their own vendor)
#               each adapter is its OWN component so siblings cannot couple
#   * cmd      : composition root; the only place allowed to import everything
# ---------------------------------------------------------------------------

allow:
  depOnAnyVendor: false      # every external dep must be opted-in via canUse
  deepScan: true             # catch structural/method-call leaks, not just imports
  ignoreNotFoundComponents: false

exclude:
  - .git
  - .github
  - .vscode
  - .claude
  - bin
  - reports
  - docs
  - data
  - testutil          # test-support infra (docker backends), outside the arch graph

excludeFiles:
  - "^.*_test\\.go$"         # tests live outside the arch scope

components:
  # The shared kernel is its own component so the DDD rule "bounded contexts
  # talk to each other only through domain/shared" is machine-checked: contexts
  # (the `domain` component) may depend on `domain_shared` but not on `domain`
  # itself, so a cross-context import (source -> item, ...) fails lint.
  domain_shared: { in: [domain/shared] }
  domain: { in: [domain, domain/**] }
  ports: { in: [ports] }
  # Conformance suites (ports/<x>test) are libraries that exercise the port
  # interfaces, so they depend on `ports` itself.
  ports_conformance: { in: [ports/**] }
  app: { in: [app, app/**] }
  # app/ingest composes app/llm (the LLM extraction step drives the LLM service).
  # Both are carved into their own components — more specific than app/** — so
  # this single app→app edge is expressed narrowly and the generic `app` ring
  # keeps its no-self-dependency guard (go-arch-lint can still flag any other
  # app↔app tangle or cycle).
  app_llm: { in: [app/llm, app/llm/**] }
  app_ingest: { in: [app/ingest, app/ingest/**] }

  # --- adapters (one component per technology; siblings stay isolated) ---
  adapter_source_memorycatalog: { in: [adapters/native/source/memorycatalog, adapters/native/source/memorycatalog/**] }
  adapter_source_filecatalog: { in: [adapters/native/source/filecatalog, adapters/native/source/filecatalog/**] }
  adapter_testdb_memorytestdb: { in: [adapters/native/testdb/memorytestdb, adapters/native/testdb/memorytestdb/**] }
  adapter_testdb_sqlitetestdb: { in: [adapters/native/testdb/sqlitetestdb, adapters/native/testdb/sqlitetestdb/**] }
  adapter_fetch_stubfetcher: { in: [adapters/native/fetch/stubfetcher, adapters/native/fetch/stubfetcher/**] }
  adapter_fetch_httpfetch: { in: [adapters/native/fetch/httpfetch, adapters/native/fetch/httpfetch/**] }
  adapter_fetch_scrapefetch: { in: [adapters/native/fetch/scrapefetch, adapters/native/fetch/scrapefetch/**] }
  adapter_fetch_apifetch: { in: [adapters/native/fetch/apifetch, adapters/native/fetch/apifetch/**] }
  adapter_llm_openaicompat: { in: [adapters/native/llm/openaicompat, adapters/native/llm/openaicompat/**] }
  adapter_llm_memoryprompts: { in: [adapters/native/llm/memoryprompts, adapters/native/llm/memoryprompts/**] }
  adapter_llm_fileprompts: { in: [adapters/native/llm/fileprompts, adapters/native/llm/fileprompts/**] }
  adapter_generate_rulegen: { in: [adapters/native/generate/rulegen, adapters/native/generate/rulegen/**] }

  # --- media / blob storage (Block 11; content-addressed, own vendor-free) ---
  adapter_blob_memoryblob: { in: [adapters/native/blob/memoryblob, adapters/native/blob/memoryblob/**] }
  adapter_blob_fsblob: { in: [adapters/native/blob/fsblob, adapters/native/blob/fsblob/**] }

  # --- composition root ---
  cmd: { in: [cmd, cmd/**] }

vendors:
  # Sentinel that matches no real path; assigning it via canUse makes
  # "this component has zero external deps" a machine-checked claim.
  _no_external_deps_: { in: __no_external_deps_sentinel__ }
  yaml: { in: ["gopkg.in/yaml.v3"] }
  sqlite: { in: ["modernc.org/sqlite"] }

deps:
  domain_shared:
    canUse: [_no_external_deps_]

  domain:
    mayDependOn: [domain_shared]
    canUse: [_no_external_deps_]

  ports:
    mayDependOn: [domain, domain_shared]
    canUse: [_no_external_deps_]

  ports_conformance:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  app:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # app/llm — the LLM use-case service; inward-only like any other use-case.
  app_llm:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # app/ingest — may compose app/llm for the LLM extraction step. This is the
  # only sanctioned app→app edge; adapters are still barred by the depguard.
  app_ingest:
    mayDependOn: [app_llm, domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  adapter_source_memorycatalog:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  adapter_source_filecatalog:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [yaml]

  adapter_testdb_memorytestdb:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # SQLite TestDb: pure-Go modernc.org/sqlite driver, isolated to acl_*.go.
  adapter_testdb_sqlitetestdb:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [sqlite]

  adapter_fetch_stubfetcher:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # Direct-download fetcher: stdlib net/http + archive/zip only.
  adapter_fetch_httpfetch:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # HTML-scrape fetcher: stdlib net/http only, inlines page HTML.
  adapter_fetch_scrapefetch:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # JSON-API fetcher: stdlib net/http + encoding/json only, inlines JSON bodies.
  adapter_fetch_apifetch:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # OpenAI-compatible LLM backend: stdlib net/http + encoding/json only.
  adapter_llm_openaicompat:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # In-memory prompt store: stdlib sync + sort only, no external deps.
  adapter_llm_memoryprompts:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # File-backed prompt store (default): one YAML per prompt, stdlib os + yaml.
  adapter_llm_fileprompts:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [yaml]

  # Procedural figural generator: stdlib math/rand + encoding/base64 only, no
  # external rule engine (resolves DESIGN Q#299 toward native Go rules).
  adapter_generate_rulegen:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # In-memory blob store: stdlib crypto/sha256 + sync only, no external deps.
  adapter_blob_memoryblob:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  # Filesystem blob store: stdlib os + crypto/sha256 only, no external deps.
  adapter_blob_fsblob:
    mayDependOn: [domain, domain_shared, ports]
    canUse: [_no_external_deps_]

  cmd:
    anyProjectDeps: true
    anyVendorDeps: true
